name: Release VSIX

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag to create/release. Defaults to v<package.json version>'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build VSIX and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT_TAG="${{ inputs.tag }}"
            if [ -n "${INPUT_TAG}" ]; then
              TAG="${INPUT_TAG}"
            else
              TAG="v${VERSION}"
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists locally."
            git checkout "refs/tags/${RELEASE_TAG}"
          elif git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
            echo "Tag ${RELEASE_TAG} already exists on origin."
            git checkout "refs/tags/${RELEASE_TAG}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
            git push origin "refs/tags/${RELEASE_TAG}"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck host
        run: npm run typecheck

      - name: Typecheck webviews
        run: npm run typecheck:webview

      - name: Read package version
        id: package
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        run: |
          mkdir -p dist
          npm run package -- --out "dist/gitstorm-${{ steps.package.outputs.version }}.vsix"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitstorm-vsix
          path: dist/*.vsix
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" > /dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/*.vsix --clobber
          else
            gh release create "${RELEASE_TAG}" dist/*.vsix \
              --title "GitStorm ${RELEASE_TAG}" \
              --generate-notes
          fi
